# Railway service config for the Django backend.
# https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 3 --timeout 120 --log-file -"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Health check the platform pings to verify deploys.
# Routes are mounted under /api/v1/ in config/urls.py.
[deploy.healthcheck]
path = "/api/v1/healthz"
timeoutSeconds = 30
